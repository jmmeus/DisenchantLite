name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DisenchantLite ${{ steps.version.outputs.VERSION }}
          body: |
            ## DisenchantLite ${{ steps.version.outputs.VERSION }}

            Download the JAR file below and place it in your `mods` folder.

            **Requirements:**
            - Minecraft: Check version in filename
            - Fabric Loader: 0.17.2+
            - Fabric API: Required

            **Changes:**
            See commit history for details.
          files: |
            build/libs/*.jar
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'beta') }}